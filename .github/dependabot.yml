version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      types:
        patterns: ["@types/*"]
      biome:
        patterns: ["@biomejs/*"]
      vitest:
        patterns: ["vitest", "@vitest/*"]
      changesets:
        patterns: ["@changesets/*"]
    commit-message:
      prefix: chore
      include: scope
    labels: [dependencies]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels: [dependencies, ci]
