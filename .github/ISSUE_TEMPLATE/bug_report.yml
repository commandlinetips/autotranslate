name: Bug report
description: Report something that isn't working
title: "bug: "
labels: [bug, triage]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, minimal description.
    validations: { required: true }
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Link to a minimal repro (StackBlitz, repo) or steps.
    validations: { required: true }
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations: { required: true }
  - type: input
    id: package
    attributes:
      label: Affected package
      placeholder: "@autotranslate/react"
    validations: { required: true }
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
    validations: { required: true }
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "v22.x"
    validations: { required: true }
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - Next.js (App Router)
        - Next.js (Pages Router)
        - Vite + React
        - Remix
        - React Native
        - Other
    validations: { required: true }
